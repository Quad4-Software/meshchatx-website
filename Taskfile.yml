version: "3"

tasks:
    dev:
        desc: Start the development server
        cmds:
            - pnpm dev

    build:
        desc: Build the production application
        cmds:
            - pnpm build

    preview:
        desc: Preview the production build
        cmds:
            - pnpm preview

    check:
        desc: Run svelte-check to verify code health
        cmds:
            - pnpm check

    install:
        desc: Install dependencies
        cmds:
            - pnpm install

    clean:
        desc: Clean build artifacts
        cmds:
            - rm -rf .svelte-kit build
