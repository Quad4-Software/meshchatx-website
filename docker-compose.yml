# Web image: multi-stage build on Chainguard Node (Wolfi), see Dockerfile.
services:
  web:
    build: .
    image: meshchatx-website:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      - DOMAIN=${DOMAIN:-meshchatx.io}
      - BUNNY_STORAGE_HOST=${BUNNY_STORAGE_HOST:-la.storage.bunnycdn.com}
      - BUNNY_STORAGE_ZONE=${BUNNY_STORAGE_ZONE:-meshchatx}
      - BUNNY_VERSIONS_PREFIX=${BUNNY_VERSIONS_PREFIX:-master}
      - BUNNY_STORAGE_ACCESS_KEY=${BUNNY_STORAGE_ACCESS_KEY:-}
      - BUNNY_PUBLIC_BASE_URL=${BUNNY_PUBLIC_BASE_URL:-https://meshchatx.b-cdn.net}
      - RELEASES_CACHE_SECONDS=${RELEASES_CACHE_SECONDS:-300}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.meshchatx-web.rule=Host(`${DOMAIN:-meshchatx.io}`) && PathPrefix(`/`)"
      - traefik.http.routers.meshchatx-web.entrypoints=web
      - traefik.http.routers.meshchatx-web.middlewares=meshchatx-sec@docker
      - traefik.http.services.meshchatx-web.loadbalancer.server.port=8080

      - traefik.http.middlewares.meshchatx-sec.headers.stsSeconds=31536000
      - traefik.http.middlewares.meshchatx-sec.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.meshchatx-sec.headers.stsPreload=true
      - traefik.http.middlewares.meshchatx-sec.headers.forceSTSHeader=false

      - "traefik.http.middlewares.meshchatx-sec.headers.contentSecurityPolicy=default-src 'self'; base-uri 'self'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://goat.meshchatx.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://goat.meshchatx.com; font-src 'self'; worker-src 'self'; connect-src 'self' https://goat.meshchatx.com; upgrade-insecure-requests"

      - traefik.http.middlewares.meshchatx-sec.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.meshchatx-sec.headers.contentTypeNosniff=true
      - traefik.http.middlewares.meshchatx-sec.headers.browserXssFilter=true
      - traefik.http.middlewares.meshchatx-sec.headers.frameDeny=true

      - "traefik.http.middlewares.meshchatx-sec.headers.customResponseHeaders.Permissions-Policy=accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
      - "traefik.http.middlewares.meshchatx-sec.headers.customResponseHeaders.X-Permitted-Cross-Domain-Policies=none"
