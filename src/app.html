<!doctype html>
<html lang="%mcx.lang%">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.webp" type="image/webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" id="mcx-theme-color" content="#09090b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var root = document.documentElement;
        var c = root.classList;
        c.remove("dark", "light");
        var t = localStorage.getItem("theme");
        var dark;
        if (t === "light") {
          c.add("light");
          dark = false;
        } else if (
          t === "dark" ||
          window.matchMedia("(prefers-color-scheme: dark)").matches
        ) {
          c.add("dark");
          dark = true;
        } else {
          c.add("light");
          dark = false;
        }
        var meta = document.getElementById("mcx-theme-color");
        if (meta) meta.setAttribute("content", dark ? "#09090b" : "#ffffff");
      })();
    </script>
    <script src="/js/swetrix.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        swetrix.init("DmtGxqOfFjbW", {
          apiURL: "https://swtrx.meshchatx.com/log",
        });
        swetrix.trackViews();
        swetrix.trackErrors({
          callback: function (error) {
            if (!error || !error.message) return false;
            var msg = error.message;
            var file = error.filename || "";
            var stack = error.stack || "";
            // Filter generic CORS "Script error" from cross-origin extensions
            if (msg === "Script error.") return false;
            // Filter crypto wallet extensions (MetaMask, etc.)
            if (/ethereum|web3|selectedAddress/i.test(msg)) return false;
            // Filter Firefox internal / extension errors
            if (/__firefox__/i.test(msg) || /__firefox__/i.test(stack))
              return false;
            // Filter common benign browser warnings
            if (/ResizeObserver loop/i.test(msg)) return false;
            // Filter extension-origin scripts
            if (
              /chrome-extension:\/\/|moz-extension:\/\/|safari-extension:\/\//i.test(
                file,
              )
            )
              return false;
            return error;
          },
        });
      });
    </script>
    <noscript>
      <img
        src="https://swtrx.meshchatx.com/log/noscript?pid=DmtGxqOfFjbW"
        alt=""
        referrerpolicy="no-referrer-when-downgrade"
      />
    </noscript>
    <noscript
      ><style>
        .mcx-js-only {
          display: none !important;
        }
      </style></noscript
    >
    %sveltekit.head%
  </head>
  <body>
    <div class="mcx-sveltekit-root" style="display: contents">
      %sveltekit.body%
    </div>
  </body>
</html>
