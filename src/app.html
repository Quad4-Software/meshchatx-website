<!doctype html>
<html lang="%mcx.lang%">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.webp" type="image/webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" id="mcx-theme-color" content="#09090b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        if ("serviceWorker" in navigator) {
          var swKey = "mcx-sw-purge-v2";
          try {
            if (!localStorage.getItem(swKey)) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                if (!regs.length) {
                  localStorage.setItem(swKey, "1");
                  return;
                }
                Promise.all(
                  regs.map(function (r) {
                    return r.unregister();
                  }),
                ).then(function () {
                  localStorage.setItem(swKey, "1");
                  location.reload();
                });
              });
            }
          } catch (e) {}
        }
        var root = document.documentElement;
        var c = root.classList;
        c.remove("dark", "light");
        var t = localStorage.getItem("theme");
        var dark;
        if (t === "light") {
          c.add("light");
          dark = false;
        } else if (
          t === "dark" ||
          window.matchMedia("(prefers-color-scheme: dark)").matches
        ) {
          c.add("dark");
          dark = true;
        } else {
          c.add("light");
          dark = false;
        }
        var meta = document.getElementById("mcx-theme-color");
        if (meta) meta.setAttribute("content", dark ? "#09090b" : "#ffffff");
      })();
    </script>
    <noscript
      ><style>
        .mcx-js-only {
          display: none !important;
        }
      </style></noscript
    >
    %sveltekit.head%
  </head>
  <body>
    <div class="mcx-sveltekit-root" style="display: contents">
      %sveltekit.body%
    </div>
  </body>
</html>
